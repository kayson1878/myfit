<html>
    <head>
        <title>History</title>
        <link href="history-page-kayson.css" rel="stylesheet" type="text/css">
    </head>

    <body>
        <h1>Workout History</h1>

        <div id="history-container"></div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
            import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

            const app = initializeApp({
                projectId: "myfit-dcf71",
                apiKey: "AIzaSyA7PK-jJrIMzmdHagX3Ob3ElC11siEACdA",
                authDomain: "myfit-dcf71.firebaseapp.com",
                storageBucket: "myfit-dcf71.firebasestorage.app",
                messagingSenderId: "743243929684",
                appId: "1:743243929684:web:a754622513177c744975c1"
            });
            const db = getFirestore(app);
            const snapshot = await getDocs(collection(db, "workouts_kayson"));
            const container = document.getElementById("history-container");

            snapshot.forEach(doc => {
                doc.data().sessions.forEach((session, i) => {
                    container.innerHTML += `
                        <div class="history-card">
                            <div class="card-number">${i + 1}</div>
                            <div class="card-content">
                                <h2 class="card-title">${session.workout}</h2>
                                <span class="card-tag">Completed</span>
                                <div class="card-stats">
                                    <span class="card-stat">${doc.id}</span>
                                    <span class="card-stat">${session.exercises.length} exercises</span>
                                </div>
                            </div>
                        </div>`;
                });
            });

            if (!snapshot.size) container.innerHTML = "<p class='no-workouts'>No workouts yet.</p>";
        </script>
    </body>
</html>
