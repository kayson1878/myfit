<html>
    <head>
        <title>Profile #1 Gabriel</title>
        <link href="main-page-gabriel.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
        <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    </head>

    <body>

        <div class="Heading">
            <h1>Welcome Gabriel</h1>
        </div>

        <div class="selector-1">
            <label class="workout-selection-1">
                <input type="radio" name="workout-selection" value="P">
                <span class="selection-button-1 selector-1-buttons">P</span>
            </label>
        
            <label class="workout-selection-2">
                <input type="radio" name="workout-selection" value="UB">
                <span class="selection-button-2 selector-1-buttons">UB</span>
            </label>
        
            <label class="workout-selection-3">
                <input type="radio" name="workout-selection" value="LB">
                <span class="selection-button-3 selector-1-buttons">LB</span>
            </label>

            <div class="top-horizontal-line"></div>
        </div>

        <div class="container-two-three">
            <div class="selector-2">
                <label class="workout-duration-1">
                    <input type="radio" name="workout-duration" value="15">
                    <span class="duration-button-1 selector-2-buttons"></span>
                    <span class="duration-text-1">15 mins</span>
                </label>
        
                <label class="workout-duration-2">
                    <input type="radio" name="workout-duration" value="30">
                    <span class="duration-button-2 selector-2-buttons"></span>
                    <span class="duration-text-2">30 mins</span>
                </label>
        
                <label class="workout-duration-3">
                    <input type="radio" name="workout-duration" value="45">
                    <span class="duration-button-3 selector-2-buttons"></span>
                    <span class="duration-text-3">45 mins</span>
                </label>

                <label class="workout-duration-4">
                    <input type="radio" name="workout-duration" value="60">
                    <span class="duration-button-4 selector-2-buttons"></span>
                    <span class="duration-text-4">60 mins</span>
                </label>
            </div>

            <div class="selector-3">
                <label class="workout-difficulty-1">
                    <input type="radio" name="workout-difficulty" value="B">
                    <span class="difficulty-button-1 selector-3-buttons"></span>
                    <span class="difficulty-text-1">Beginner</span>
                </label>
        
                <label class="workout-difficulty-2">
                    <input type="radio" name="workout-difficulty" value="M">
                    <span class="difficulty-button-2 selector-3-buttons"></span>
                    <span class="difficulty-text-2">Moderate</span>
                </label>
        
                <label class="workout-difficulty-3">
                    <input type="radio" name="workout-difficulty" value="A">
                    <span class="difficulty-button-3 selector-3-buttons"></span>
                    <span class="difficulty-text-3">Advanced</span>
                </label>
            </div>
        </div>

        <button class="selector-4" id="continue-button">
            Continue
        </button>
        
        <div class="middle-horizontal-line"></div>

        <div class="page-selector">
            <a href="main-page-gabriel.html">
                    <div class="page-selection-1"> 
                    H
                    </div>
                </a>

            <a href="friends-page-gabriel.html">
                    <div class="page-selection-2"> 
                    F
                    </div>
                </a>

            <a href="history-page-gabriel.html">
                    <div class="page-selection-3"> 
                    H
                    </div>
                </a>
        </div>
        
        <div class="bottom-horizontal-line"></div>


        <script type="py" src="workout_selector_gabriel.py"></script>
    </body>

</html>
